services:
  - type: web
    name: recruit-ai
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    env:
      - key: EMAIL_USER
        fromService: secret
      - key: EMAIL_PASS
        fromService: secret
      - key: HR_EMAIL
        fromService: secret
      - key: GEMINI_API_KEY
        fromService: secret
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: EMAIL_HOST
        value: imap.gmail.com
      - key: EMAIL_PORT
        value: "993"
